    <!-- ═══════════════════════════════════════════
         CRITICAL CSS — بدون تعديلات على حجم الصور
    ══════════════════════════════════════════════ -->
    <style>
      /* Reset أساسي */
      *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
      html { scroll-behavior: smooth; overflow-x: hidden; }

      body {
        font-family: 'Plus Jakarta Sans', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
        background: #0d1223;
        color: #eef1fb;
        min-height: 100vh;
        overflow-x: hidden;
        -webkit-font-smoothing: antialiased;
        -moz-osx-font-smoothing: grayscale;
      }

      [data-theme="light"] body {
        background: #ffffff;
        color: #0f172a;
      }

      #root { min-height: 100vh; }

      /* تم إزالة max-width و height: auto — الصور تعرض بحجمها الطبيعي، مع منع الفراغات السفلية فقط */
      img { display: block; }

      #root:empty::after {
        content: '';
        display: block;
        width: 100%;
        height: 100vh;
        background: #0d1223;
      }
      [data-theme="light"] #root:empty::after {
        background: #ffffff;
      }
    </style>

    <script>
      (function() {
        try {
          var t = localStorage.getItem('theme') || 'dark';
          document.documentElement.setAttribute('data-theme', t);
          var tc = document.querySelector('meta[name="theme-color"]');
          if (tc) tc.setAttribute('content', t === 'dark' ? '#0d1223' : '#ffffff');
        } catch(e) {}
      })();
    </script>
