<!DOCTYPE html>
<html lang="en" dir="ltr">
<head>

  <!-- =========================
       BASIC META
  ========================== -->
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />

  <!-- TITLE (Brand Signal قوي) -->
  <title>FlexExams - IT Certification Practice Tests</title>

  <!-- DESCRIPTION (مهم للـ snippet) -->
  <meta name="description" content="FlexExams is an IT certification practice platform with real exam questions, timed tests, and instant explanations for 50+ certifications." />

  <!-- SEO CONTROL -->
  <meta name="robots" content="index, follow, max-image-preview:large, max-snippet:-1" />

  <!-- CANONICAL (لازم ثابت) -->
  <link rel="canonical" href="https://www.flexexams.com/" />

  <!-- =========================
       OPEN GRAPH (Facebook / Google Preview)
  ========================== -->
  <meta property="og:type" content="website" />
  <meta property="og:site_name" content="FlexExams" />
  <meta property="og:title" content="FlexExams - IT Certification Practice Tests" />
  <meta property="og:description" content="Real exam simulations for IT certifications with instant feedback and explanations." />
  <meta property="og:url" content="https://www.flexexams.com/" />
  <meta property="og:image" content="https://www.flexexams.com/og-image.png" />
  <meta property="og:image:width" content="1200" />
  <meta property="og:image:height" content="630" />
  <meta property="og:image:alt" content="FlexExams Certification Platform" />

  <!-- =========================
       TWITTER CARD
  ========================== -->
  <meta name="twitter:card" content="summary_large_image" />
  <meta name="twitter:title" content="FlexExams" />
  <meta name="twitter:description" content="IT Certification Practice Tests Platform" />
  <meta name="twitter:image" content="https://www.flexexams.com/og-image.png" />

  <!-- =========================
       BRAND SIGNALS
  ========================== -->
  <meta name="application-name" content="FlexExams" />
  <meta name="author" content="FlexExams" />

  <!-- =========================
       FAVICON
  ========================== -->
  <link rel="icon" href="/favicon.ico" />
  <link rel="icon" type="image/png" sizes="32x32" href="/icons/icon-32x32.png" />
  <link rel="icon" type="image/png" sizes="16x16" href="/icons/icon-16x16.png" />
  <link rel="apple-touch-icon" href="/icons/icon-180x180.png" />

  <!-- =========================
       SCHEMA (IMPORTANT)
  ========================== -->

  <!-- ORGANIZATION -->
  <script type="application/ld+json">
  {
    "@context": "https://schema.org",
    "@type": "Organization",
    "@id": "https://www.flexexams.com/#organization",
    "name": "FlexExams",
    "url": "https://www.flexexams.com",
    "logo": "https://www.flexexams.com/icons/icon-512x512.png",
    "image": "https://www.flexexams.com/og-image.png",
    "description": "IT certification practice platform with real exam questions and AI explanations.",
    "sameAs": [
      "https://twitter.com/FlexExams",
      "https://linkedin.com/company/flexexams"
    ]
  }
  </script>

  <!-- WEBSITE -->
  <script type="application/ld+json">
  {
    "@context": "https://schema.org",
    "@type": "WebSite",
    "name": "FlexExams",
    "url": "https://www.flexexams.com",
    "publisher": {
      "@id": "https://www.flexexams.com/#organization"
    }
  }
  </script>

  <!-- =========================
       PERFORMANCE (اختياري لكن مفيد)
  ========================== -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />

</head>

<body>
  <div id="root"></div>
  <script type="module" src="./src/main.jsx"></script>
</body>
</html>
